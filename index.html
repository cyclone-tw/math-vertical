<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>數學直式計算練習</title>
<style>
/* ===== Reset & Base ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 18px; }
body {
  font-family: 'Noto Sans TC', 'Microsoft JhengHei', sans-serif;
  background: #0a1628;
  color: #fff;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  padding: 20px;
}

/* ===== Screen containers ===== */
.screen { display: none; width: 100%; max-width: 800px; margin: 0 auto; }
.screen.active { display: block; }

/* ===== Setup Screen ===== */
#setup-screen {
  background: #132040;
  border-radius: 16px;
  padding: 32px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.4);
}
#setup-screen h1 { text-align: center; font-size: 2rem; margin-bottom: 24px; color: #64b5f6; }
.form-group { margin-bottom: 20px; }
.form-group label { display: block; font-size: 1rem; font-weight: bold; margin-bottom: 8px; color: #90caf9; }
.form-group input[type="text"],
.form-group input[type="number"],
.form-group input[type="url"] {
  width: 100%;
  padding: 12px;
  border: 2px solid #1e3a5f;
  border-radius: 8px;
  background: #0d1b2e;
  color: #fff;
  font-size: 1rem;
}
.form-group input:focus { border-color: #64b5f6; outline: none; }
.checkbox-group { display: flex; gap: 16px; flex-wrap: wrap; }
.checkbox-group label {
  display: flex; align-items: center; gap: 8px;
  padding: 10px 16px; background: #1e3a5f; border-radius: 8px;
  cursor: pointer; font-weight: normal; color: #fff;
  transition: background 0.2s;
}
.checkbox-group label:has(input:checked) { background: #1565c0; }
.checkbox-group input[type="checkbox"] { width: 18px; height: 18px; accent-color: #64b5f6; }
.radio-group { display: flex; gap: 12px; flex-wrap: wrap; }
.radio-group label {
  padding: 10px 16px; background: #1e3a5f; border-radius: 8px;
  cursor: pointer; font-weight: normal; color: #fff;
  transition: background 0.2s;
}
.radio-group label:has(input:checked) { background: #1565c0; }
.radio-group input[type="radio"] { display: none; }
.toggle-row { display: flex; align-items: center; gap: 12px; }
.toggle-switch {
  position: relative; width: 52px; height: 28px;
  background: #455a64; border-radius: 14px; cursor: pointer;
  transition: background 0.3s;
}
.toggle-switch.on { background: #43a047; }
.toggle-switch .knob {
  position: absolute; top: 3px; left: 3px;
  width: 22px; height: 22px; background: #fff;
  border-radius: 50%; transition: left 0.3s;
}
.toggle-switch.on .knob { left: 27px; }
.inline-group { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
.inline-group input[type="number"] { width: 80px; }

#btn-start {
  display: block; width: 100%; padding: 16px;
  background: linear-gradient(135deg, #43a047, #2e7d32);
  color: #fff; border: none; border-radius: 12px;
  font-size: 1.4rem; font-weight: bold; cursor: pointer;
  margin-top: 24px; transition: transform 0.2s;
}
#btn-start:hover { transform: scale(1.02); }
#btn-start:active { transform: scale(0.98); }

/* ===== Practice Screen ===== */
#practice-screen { max-width: 900px; position: relative; }
.top-bar {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 16px; padding: 8px 0;
}
.progress-info { font-size: 1.2rem; color: #90caf9; }
#timer-display {
  font-size: 1.4rem; font-weight: bold; padding: 8px 16px;
  background: #1e3a5f; border-radius: 8px; font-variant-numeric: tabular-nums;
}
#timer-display.warning { background: #c62828; animation: blink 0.5s infinite; }
@keyframes blink { 50% { opacity: 0.5; } }
.top-bar-right { display: flex; gap: 12px; align-items: center; }
#mute-btn {
  background: none; border: 2px solid #546e7a; border-radius: 8px;
  color: #fff; font-size: 1.2rem; padding: 6px 10px; cursor: pointer;
}

/* ===== Vertical Layout ===== */
.problem-area {
  display: flex; flex-direction: column; align-items: center;
  padding: 24px; background: #132040; border-radius: 16px;
  min-height: 300px;
}
.vertical-problem {
  display: inline-grid;
  gap: 4px;
  justify-items: center;
  align-items: center;
  font-size: 72px;
  font-weight: bold;
  line-height: 1.2;
}
.vertical-problem .cell {
  width: 80px; height: 90px;
  display: flex; align-items: center; justify-content: center;
}
.vertical-problem .op-cell {
  font-size: 48px; color: #ffb74d;
}
.vertical-problem .separator {
  height: 6px; background: #fff; border-radius: 3px;
}
/* Position-value colors */
.pos-ones { color: #66bb6a; }
.pos-tens { color: #42a5f5; }
.pos-hundreds { color: #ff9800; }
.pos-thousands { color: #ef5350; }

.digit-input {
  width: 76px; height: 86px;
  text-align: center; font-size: 64px; font-weight: bold;
  border: 3px solid #546e7a; border-radius: 10px;
  background: #0d1b2e; color: #fff;
  caret-color: #64b5f6;
  outline: none;
  transition: border-color 0.2s, background 0.2s;
}
.digit-input:focus { border-color: #64b5f6; background: #1a2d4a; }
.digit-input.locked { background: #263238; color: #90a4ae; }
.digit-input.correct-cell { border-color: #43a047; background: #1b3a1b; }
.digit-input.wrong-cell { border-color: #e53935; background: #3a1b1b; }

.carry-input {
  width: 40px; height: 44px;
  text-align: center; font-size: 28px; font-weight: bold;
  border: 2px solid #f9a825; border-radius: 6px;
  background: #3e2723; color: #fdd835;
  outline: none;
}
.carry-input:focus { background: #4e3723; }
.carry-cell { width: 40px; height: 44px; }

/* Borrow display for subtraction — clean annotation style */
.borrow-annotated-cell {
  position: relative;
  width: 80px; height: 90px;
  display: flex; align-items: center; justify-content: center;
}
.borrow-annotated-cell .main-digit {
  font-size: 72px; font-weight: bold;
}
.borrow-annotated-cell .borrow-note {
  position: absolute; top: -2px; right: -28px;
  font-size: 13px; color: #ff9800; font-weight: bold;
  white-space: nowrap; line-height: 1.2;
}
/* Hint text above answer input */
.digit-hint {
  font-size: 14px; color: #90a4ae; text-align: center;
  margin-bottom: 2px; min-height: 18px;
}
/* Borrow label floating above the ones column */
.borrow-label-row {
  font-size: 15px; color: #ff9800; font-weight: bold;
  text-align: center; min-height: 22px;
}

/* Per-cell instant feedback toast */
.cell-feedback {
  margin-top: 12px; padding: 10px 18px;
  border-radius: 8px; font-size: 1.1rem;
  text-align: center; max-width: 500px;
  transition: opacity 0.5s ease;
}
.cell-feedback.correct-feedback {
  background: #1b5e20; border: 2px solid #66bb6a; color: #c8e6c9;
}
.cell-feedback.wrong-feedback {
  background: #1a237e; border: 2px solid #5c6bc0; color: #c5cae9;
}
.cell-feedback.wrong-feedback-step {
  background: #1b5e20; border: 2px solid #66bb6a; color: #c8e6c9;
}
.cell-feedback.wrong-feedback-full {
  background: #e65100; border: 2px solid #ff9800; color: #ffe0b2;
}
.cell-feedback.fade-out { opacity: 0; }

/* Mode A: single answer input */
.answer-single-input {
  width: 300px; height: 86px;
  text-align: right; font-size: 64px; font-weight: bold;
  border: 3px solid #43a047; border-radius: 10px;
  background: #0d1b2e; color: #fff;
  padding: 0 12px;
  outline: none;
}
.answer-single-input:focus { border-color: #66bb6a; background: #1a2d4a; }

/* ===== Scaffold messages ===== */
.scaffold-msg {
  margin-top: 16px; padding: 16px 20px;
  border-radius: 10px; font-size: 1.2rem;
  text-align: center; max-width: 600px;
}
.scaffold-hint { background: #1a237e; border: 2px solid #5c6bc0; color: #c5cae9; }
.scaffold-step { background: #1b5e20; border: 2px solid #66bb6a; color: #c8e6c9; }
.scaffold-full { background: #e65100; border: 2px solid #ff9800; color: #ffe0b2; }

/* ===== Buttons ===== */
.btn-confirm {
  margin-top: 20px; padding: 14px 40px;
  background: linear-gradient(135deg, #43a047, #2e7d32);
  color: #fff; border: none; border-radius: 10px;
  font-size: 1.3rem; font-weight: bold; cursor: pointer;
  transition: transform 0.2s;
}
.btn-confirm:hover { transform: scale(1.05); }
.btn-confirm:active { transform: scale(0.95); }
.btn-next {
  margin-top: 12px; padding: 12px 32px;
  background: #1565c0; color: #fff; border: none; border-radius: 10px;
  font-size: 1.2rem; cursor: pointer;
}

/* ===== Multiplication Steps ===== */
.mult-step-info {
  margin-top: 12px; padding: 12px 20px;
  background: #1a237e; border-radius: 10px;
  font-size: 1.2rem; color: #bbdefb;
  text-align: center;
}
.highlight-digit {
  color: #fdd835; font-size: 1.4em; font-weight: bold;
  text-decoration: underline;
}

/* ===== Shake Animation ===== */
@keyframes shake {
  0%, 100% { transform: translateX(0); }
  20% { transform: translateX(-8px); }
  40% { transform: translateX(8px); }
  60% { transform: translateX(-6px); }
  80% { transform: translateX(6px); }
}
.shake { animation: shake 0.4s ease-in-out; }

/* ===== Star Animation ===== */
.star-container {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  pointer-events: none; z-index: 1000;
}
.star {
  position: absolute; font-size: 2rem;
  animation: starBurst 1s ease-out forwards;
}
@keyframes starBurst {
  0% { transform: scale(0) rotate(0deg); opacity: 1; }
  50% { transform: scale(1.5) rotate(180deg); opacity: 1; }
  100% { transform: scale(0.5) rotate(360deg); opacity: 0; }
}

/* ===== Confetti ===== */
.confetti-container {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  pointer-events: none; z-index: 1000; overflow: hidden;
}
.confetti-piece {
  position: absolute; top: -20px; width: 12px; height: 12px;
  animation: confettiFall 3s ease-in forwards;
}
@keyframes confettiFall {
  0% { transform: translateY(0) rotate(0deg); opacity: 1; }
  100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
}

/* ===== Result Screen ===== */
#result-screen {
  background: #132040; border-radius: 16px; padding: 32px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.4);
}
#result-screen h1 { text-align: center; font-size: 2rem; margin-bottom: 20px; color: #64b5f6; }
.result-summary {
  text-align: center; padding: 20px;
  background: #1e3a5f; border-radius: 12px;
  margin-bottom: 20px;
}
.result-summary .big-score { font-size: 4rem; font-weight: bold; color: #fdd835; }
.result-summary .sub-info { font-size: 1.1rem; color: #90caf9; margin-top: 8px; }
.result-table {
  width: 100%; border-collapse: collapse; margin: 20px 0;
  font-size: 0.95rem;
}
.result-table th, .result-table td {
  padding: 10px 12px; border: 1px solid #1e3a5f;
  text-align: center;
}
.result-table th { background: #1565c0; }
.result-table tr:nth-child(even) { background: #0d1b2e; }
.result-table .correct-row { color: #66bb6a; }
.result-table .wrong-row { color: #ef5350; }

.result-buttons { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; margin-top: 20px; }
.result-buttons button {
  padding: 12px 24px; border: none; border-radius: 10px;
  font-size: 1rem; font-weight: bold; cursor: pointer;
  transition: transform 0.2s;
}
.result-buttons button:hover { transform: scale(1.05); }
.btn-download { background: #43a047; color: #fff; }
.btn-copy { background: #1565c0; color: #fff; }
.btn-upload { background: #e65100; color: #fff; }
.btn-retry { background: #7b1fa2; color: #fff; }
.btn-reset { background: #455a64; color: #fff; }

/* ===== Toast ===== */
.toast {
  position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
  padding: 12px 24px; background: #333; color: #fff;
  border-radius: 8px; font-size: 1rem; z-index: 2000;
  animation: toastIn 0.3s ease, toastOut 0.3s ease 1.7s forwards;
}
@keyframes toastIn { from { opacity: 0; transform: translateX(-50%) translateY(20px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
@keyframes toastOut { from { opacity: 1; } to { opacity: 0; } }

/* ===== Responsive ===== */
@media (max-width: 600px) {
  html { font-size: 14px; }
  .vertical-problem { font-size: 48px; }
  .vertical-problem .cell { width: 56px; height: 64px; }
  .digit-input { width: 52px; height: 60px; font-size: 44px; }
  .carry-input { width: 32px; height: 36px; font-size: 22px; }
  .carry-cell { width: 32px; height: 36px; }
  .answer-single-input { width: 220px; height: 64px; font-size: 44px; }
  .borrow-annotated-cell { width: 56px; height: 64px; }
  .borrow-annotated-cell .main-digit { font-size: 48px; }
  .borrow-annotated-cell .borrow-note { font-size: 11px; right: -22px; }
}
</style>
</head>
<body>

<!-- ==================== SCREEN 1: SETUP ==================== -->
<div id="setup-screen" class="screen active">
  <h1>📐 數學直式計算練習</h1>

  <div class="form-group">
    <label>學生姓名</label>
    <input type="text" id="student-name" placeholder="請輸入學生姓名">
  </div>

  <div class="form-group">
    <label>運算類型（可複選）</label>
    <div class="checkbox-group">
      <label><input type="checkbox" name="ops" value="add" checked> ＋ 加法</label>
      <label><input type="checkbox" name="ops" value="sub"> ＋ 減法</label>
      <label><input type="checkbox" name="ops" value="mul"> × 乘法</label>
      <label><input type="checkbox" name="ops" value="div"> ÷ 除法</label>
    </div>
  </div>

  <div class="form-group">
    <label>第一個數位數</label>
    <div class="radio-group">
      <label><input type="radio" name="digits1" value="1"> 1 位</label>
      <label><input type="radio" name="digits1" value="2" checked> 2 位</label>
      <label><input type="radio" name="digits1" value="3"> 3 位</label>
    </div>
  </div>

  <div class="form-group">
    <label>第二個數位數</label>
    <div class="radio-group">
      <label><input type="radio" name="digits2" value="1" checked> 1 位</label>
      <label><input type="radio" name="digits2" value="2"> 2 位</label>
      <label><input type="radio" name="digits2" value="3"> 3 位</label>
    </div>
  </div>

  <div class="form-group">
    <label>是否允許進位／退位</label>
    <div class="toggle-row">
      <div class="toggle-switch" id="carry-toggle" onclick="toggleSwitch(this)">
        <div class="knob"></div>
      </div>
      <span id="carry-label">不允許</span>
    </div>
  </div>

  <div class="form-group">
    <label>出題數量</label>
    <div class="inline-group">
      <div class="radio-group">
        <label><input type="radio" name="count" value="5"> 5</label>
        <label><input type="radio" name="count" value="10" checked> 10</label>
        <label><input type="radio" name="count" value="15"> 15</label>
        <label><input type="radio" name="count" value="20"> 20</label>
        <label><input type="radio" name="count" value="custom"> 自訂</label>
      </div>
      <input type="number" id="custom-count" min="1" max="50" value="10" style="display:none">
    </div>
  </div>

  <div class="form-group">
    <label>限時設定</label>
    <div class="toggle-row">
      <div class="toggle-switch" id="timer-toggle" onclick="toggleSwitch(this)">
        <div class="knob"></div>
      </div>
      <span id="timer-label">不限時</span>
      <input type="number" id="timer-minutes" min="1" max="60" value="5" style="display:none">
      <span id="timer-minutes-label" style="display:none">分鐘</span>
    </div>
  </div>

  <div class="form-group">
    <label>鷹架等級</label>
    <div class="radio-group">
      <label><input type="radio" name="scaffold" value="rethink" checked> 再想想</label>
      <label><input type="radio" name="scaffold" value="step"> 步驟提示</label>
      <label><input type="radio" name="scaffold" value="full"> 完全引導</label>
    </div>
  </div>

  <div class="form-group">
    <label>語音設定（TTS）</label>
    <div class="toggle-row" style="margin-bottom:12px;">
      <div class="toggle-switch" id="tts-toggle" onclick="toggleSwitch(this)">
        <div class="knob"></div>
      </div>
      <span id="tts-label">關閉</span>
    </div>
    <div id="tts-rate-group" style="display:none;">
      <label style="font-size:0.9rem; color:#90caf9; margin-bottom:4px;">語速：<span id="tts-rate-value">1.0</span>x</label>
      <input type="range" id="tts-rate" min="0.5" max="2.0" step="0.1" value="1.0" style="width:100%; accent-color:#64b5f6;" oninput="document.getElementById('tts-rate-value').textContent = this.value">
      <button type="button" onclick="testTTS()" style="margin-top:8px; padding:8px 16px; background:#1565c0; color:#fff; border:none; border-radius:8px; font-size:0.9rem; cursor:pointer;">測試語音</button>
    </div>
  </div>

  <div class="form-group">
    <label>Google Sheets Script URL（選填）</label>
    <input type="url" id="sheets-url" placeholder="https://script.google.com/macros/s/...">
  </div>

  <button id="btn-start" onclick="startPractice()">開始練習</button>
</div>

<!-- ==================== SCREEN 2: PRACTICE ==================== -->
<div id="practice-screen" class="screen">
  <div class="top-bar">
    <span class="progress-info" id="progress-info">第 1 / 10 題</span>
    <div class="top-bar-right">
      <span id="timer-display">00:00</span>
      <button id="mute-btn" onclick="toggleMute()">🔊</button>
      <button id="tts-btn" onclick="toggleTTS()" style="background:none; border:2px solid #546e7a; border-radius:8px; color:#fff; font-size:1.2rem; padding:6px 10px; cursor:pointer;" title="語音朗讀">🔇</button>
      <button id="abandon-btn" onclick="abandonPractice()" style="background:#c62828; color:#fff; border:none; border-radius:8px; padding:6px 14px; font-size:1rem; cursor:pointer;">放棄</button>
    </div>
  </div>
  <div class="problem-area" id="problem-area">
    <!-- Dynamic content -->
  </div>
</div>

<!-- ==================== SCREEN 3: RESULT ==================== -->
<div id="result-screen" class="screen">
  <h1>📊 練習報告</h1>
  <div id="result-content"></div>
</div>

<script>
// ===== STATE =====
let config = {};
let problems = [];
let currentIdx = 0;
let results = [];
let timerInterval = null;
let elapsedSeconds = 0;
let timeLimitSeconds = 0;
let isMuted = false;
let audioCtx = null;
let currentProblem = null;
let retryAllowed = false;
// For guided mode state
let guidedStep = 0;
let cellRetryCount = {}; // Track per-cell wrong attempts for scaffold escalation
let currentHadError = false; // Track if current problem had any error

// ===== TTS STATE =====
let ttsEnabled = false;
let ttsRate = 1.0;
let ttsVoice = null;

// Initialize TTS voices
function initTTSVoices() {
  try {
    if (!window.speechSynthesis) { console.warn('[TTS] speechSynthesis not supported'); return; }
    const pickVoice = () => {
      const voices = speechSynthesis.getVoices();
      console.log('[TTS] available voices:', voices.length, voices.filter(v => v.lang.startsWith('zh')).map(v => `${v.name}(${v.lang})`));
      ttsVoice = voices.find(v => v.lang === 'zh-TW')
        || voices.find(v => v.lang === 'zh-HK')
        || voices.find(v => v.lang.startsWith('zh'))
        || null;
      if (ttsVoice) console.log('[TTS] selected voice:', ttsVoice.name, ttsVoice.lang);
      else console.warn('[TTS] no Chinese voice found, will use lang attribute fallback');
    };
    pickVoice();
    if (speechSynthesis.onvoiceschanged !== undefined) {
      speechSynthesis.onvoiceschanged = pickVoice;
    }
  } catch (e) { console.error('[TTS] initTTSVoices error:', e); }
}
initTTSVoices();

function speak(text) {
  if (!ttsEnabled) return;
  try {
    if (!window.speechSynthesis) { console.warn('[TTS] speechSynthesis not available'); return; }
    console.log('[TTS] speak:', text, '| speaking:', speechSynthesis.speaking, '| pending:', speechSynthesis.pending, '| paused:', speechSynthesis.paused);
    speechSynthesis.cancel();
    const utter = new SpeechSynthesisUtterance(text);
    utter.rate = ttsRate;
    // Try zh-TW first, fallback to zh
    if (ttsVoice) {
      utter.voice = ttsVoice;
      utter.lang = ttsVoice.lang;
    } else {
      utter.lang = 'zh-TW';
    }
    utter.onerror = (e) => {
      console.warn('[TTS] utterance error:', e.error);
      // Fallback: retry with lang='zh' if zh-TW failed
      if (utter.lang === 'zh-TW') {
        console.log('[TTS] retrying with lang=zh');
        const retry = new SpeechSynthesisUtterance(text);
        retry.lang = 'zh';
        retry.rate = ttsRate;
        speechSynthesis.speak(retry);
      }
    };
    speechSynthesis.speak(utter);
  } catch (e) { console.error('[TTS] speak error:', e); }
}

function toggleTTS() {
  ttsEnabled = !ttsEnabled;
  document.getElementById('tts-btn').textContent = ttsEnabled ? '🔊' : '🔇';
}

function unlockSpeechSynthesis() {
  // Must be called synchronously in a user gesture (click) handler
  try {
    if (!window.speechSynthesis) { console.warn('[TTS] unlock: speechSynthesis not available'); return; }
    speechSynthesis.cancel();

// ===== PROBLEM GENERATION =====
function randInt(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }

function numOfDigits(d) {
  if (d === 1) return [1, 9];
  if (d === 2) return [10, 99];
  return [100, 999];
}

function getDigitAt(n, pos) {
  return Math.floor(n / Math.pow(10, pos)) % 10;
}

function generateProblem(op, d1, d2, allowCarry) {
  const [min1, max1] = numOfDigits(d1);
  const [min2, max2] = numOfDigits(d2);
  let a, b, attempts = 0;

  switch (op) {
    case 'add':
      while (attempts++ < 500) {
        a = randInt(min1, max1);
        b = randInt(min2, max2);
        if (!allowCarry) {
          // Each column sum < 10
          let ok = true;
          const maxPos = Math.max(d1, d2);
          for (let p = 0; p < maxPos; p++) {
            if (getDigitAt(a, p) + getDigitAt(b, p) >= 10) { ok = false; break; }
          }
          if (!ok) continue;
        }
        return { op: '+', a, b, answer: a + b };
      }
      // fallback: simple no-carry
      a = min1; b = min2;
      return { op: '+', a, b, answer: a + b };

    case 'sub':
      while (attempts++ < 500) {
        a = randInt(min1, max1);
        b = randInt(min2, max2);
        if (a < b) [a, b] = [b, a];
        if (a < min1) continue;
        if (!allowCarry) {
          let ok = true;
          const maxPos = Math.max(d1, d2);
          for (let p = 0; p < maxPos; p++) {
            if (getDigitAt(a, p) < getDigitAt(b, p)) { ok = false; break; }
          }
          if (!ok) continue;
        }
        if (a >= b) return { op: '-', a, b, answer: a - b };
      }
      a = max1; b = min2;
      return { op: '-', a, b, answer: a - b };

    case 'mul':
      while (attempts++ < 500) {
        a = randInt(min1, max1);
        b = randInt(min2, max2);
        if (!allowCarry) {
          // Each digit of a * each digit of b < 10, and no carrying in partial sums
          let ok = true;
          for (let p1 = 0; p1 < d1; p1++) {
            for (let p2 = 0; p2 < d2; p2++) {
              if (getDigitAt(a, p1) * getDigitAt(b, p2) >= 10) { ok = false; break; }
            }
            if (!ok) break;
          }
          if (!ok) continue;
          // Also check partial products don't cause carrying when summed
          if (a * b !== checkNoCarrySum(a, b, d1, d2)) continue;
        }
        return { op: '×', a, b, answer: a * b };
      }
      a = 11; b = 2;
      return { op: '×', a, b, answer: a * b };

    case 'div':
      while (attempts++ < 500) {
        // Generate divisor and quotient, then dividend = quotient * divisor
        b = randInt(min2, max2);
        if (b === 0) continue;
        const [minQ, maxQ] = numOfDigits(d1);
        const quotient = randInt(Math.max(1, Math.ceil(minQ / b)), Math.min(maxQ, Math.floor(max1 / b)));
        if (quotient < 1) continue;
        a = quotient * b;
        if (a < min1 || a > max1) continue;
        if (!allowCarry) {
          // For no-carry division, ensure each digit of quotient * divisor doesn't exceed that "column"
          // Simplified: just allow it if basic
        }
        return { op: '÷', a, b, answer: quotient };
      }
      // fallback
      b = Math.max(min2, 2);
      a = b * randInt(2, 5);
      return { op: '÷', a, b, answer: Math.floor(a / b) };
  }
}

function checkNoCarrySum(a, b, d1, d2) {
  // Very simplified check - compute the product and verify
  return a * b;
}

function generateAllProblems() {
  problems = [];
  for (let i = 0; i < config.count; i++) {
    const op = config.ops[randInt(0, config.ops.length - 1)];
    problems.push(generateProblem(op, config.digits1, config.digits2, config.allowCarry));
  }
}

// ===== AUDIO =====
function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function playCorrectSound() {
  if (isMuted) return;
  try {
    const ctx = getAudioCtx();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.type = 'sine';
    osc.frequency.setValueAtTime(523, ctx.currentTime);
    osc.frequency.setValueAtTime(659, ctx.currentTime + 0.1);
    osc.frequency.setValueAtTime(784, ctx.currentTime + 0.2);
    gain.gain.setValueAtTime(0.3, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.4);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + 0.4);
  } catch (e) {}
}

function playWrongSound() {
  if (isMuted) return;
  try {
    const ctx = getAudioCtx();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.type = 'square';
    osc.frequency.setValueAtTime(200, ctx.currentTime);
    gain.gain.setValueAtTime(0.15, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + 0.3);
  } catch (e) {}
}

function playCelebrationSound() {
  if (isMuted) return;
  try {
    const ctx = getAudioCtx();
    const notes = [523, 587, 659, 698, 784, 880, 988, 1047];
    notes.forEach((freq, i) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.type = 'sine';
      osc.frequency.setValueAtTime(freq, ctx.currentTime + i * 0.1);
      gain.gain.setValueAtTime(0.2, ctx.currentTime + i * 0.1);
      gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + i * 0.1 + 0.2);
      osc.start(ctx.currentTime + i * 0.1);
      osc.stop(ctx.currentTime + i * 0.1 + 0.3);
    });
  } catch (e) {}
}

function startTimer() {
  elapsedSeconds = 0;
  timeLimitSeconds = config.timerOn ? config.timerMinutes * 60 : 0;
  updateTimerDisplay();
  timerInterval = setInterval(() => {
    elapsedSeconds++;
    updateTimerDisplay();
    if (config.timerOn && elapsedSeconds >= timeLimitSeconds) {
      clearInterval(timerInterval);
      finishPractice();
    }
  }, 1000);
}

function updateTimerDisplay() {
  const display = document.getElementById('timer-display');
  const remaining = config.timerOn ? timeLimitSeconds - elapsedSeconds : elapsedSeconds;
  const t = config.timerOn ? remaining : elapsedSeconds;
  const m = Math.floor(Math.max(0, t) / 60);
  const s = Math.max(0, t) % 60;
  display.textContent = String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');

  if (config.timerOn && remaining <= 10 && remaining > 0) {
    display.classList.add('warning');
  } else {
    display.classList.remove('warning');
  }
}

// ===== POSITION VALUE COLOR =====
function posClass(pos) {
  if (pos === 0) return 'pos-ones';
  if (pos === 1) return 'pos-tens';
  if (pos === 2) return 'pos-hundreds';
  return 'pos-thousands';
}

function posLabel(pos) {
  return ['個','十','百','千'][pos] || '';
}

// ===== RENDER PROBLEM =====
function showProblem() {
  if (currentIdx >= problems.length) { finishPractice(); return; }
  currentProblem = problems[currentIdx];
  retryAllowed = false;
  guidedStep = 0;
  cellRetryCount = {};
  currentHadError = false;
  document.getElementById('progress-info').textContent = `第 ${currentIdx + 1} / ${problems.length} 題`;

  // TTS: announce the problem
  const opNames = { '+': '加', '-': '減', '×': '乘以', '÷': '除以' };
  speak(`第${currentIdx + 1}題，${currentProblem.a} ${opNames[currentProblem.op] || ''} ${currentProblem.b}`);

  const area = document.getElementById('problem-area');

  if (currentProblem.op === '÷') {
    renderDivision(area);
  } else if (currentProblem.op === '×') {
    renderMultiplicationGuided(area);
  } else {
    renderStandard(area);
  }
}

// ===== STANDARD RENDER (Add/Sub/Mul-direct) =====
function renderStandard(area) {
  const p = currentProblem;
  const aStr = String(p.a);
  const bStr = String(p.b);
  const ansStr = String(p.answer);
  const maxLen = Math.max(aStr.length, bStr.length, ansStr.length);
  const totalCols = maxLen + 1; // +1 for op or overflow

  const needCarry = (p.op === '+' || p.op === '×');
  const needBorrow = (p.op === '-');

  // Precompute borrow info for subtraction
  let borrowInfo = null;
  if (needBorrow) {
    borrowInfo = precomputeBorrow(p.a, p.b);
  }

  let html = '';
  const colCount = totalCols;
  html += `<div class="vertical-problem" style="grid-template-columns: repeat(${colCount}, 80px);" id="vp-grid">`;

  // Row 0: Carry row (for addition)
  if (needCarry) {
    for (let c = 0; c < colCount; c++) {
      const pos = colCount - 1 - c;
      if (pos > 0 && pos <= maxLen) {
        html += `<div class="cell carry-cell"><input class="carry-input" id="carry-${pos}" maxlength="1" inputmode="numeric" data-pos="${pos}" disabled></div>`;
      } else {
        html += `<div class="cell carry-cell"></div>`;
      }
    }
  }

  // Row 0.5: Borrow annotation row (only for subtraction with borrow in guided mode)
  if (borrowInfo) {
    for (let c = 0; c < colCount; c++) {
      const pos = colCount - 1 - c;
      if (c === 0) {
        html += `<div class="borrow-label-row"></div>`;
      } else if (borrowInfo[pos] && borrowInfo[pos].needsBorrow) {
        html += `<div class="borrow-label-row">借10↓</div>`;
      } else {
        html += `<div class="borrow-label-row"></div>`;
      }
    }
  }

  // Row 1: First number (right-aligned) — always show original digits clearly
  for (let c = 0; c < colCount; c++) {
    const pos = colCount - 1 - c;
    const digitIdx = aStr.length - 1 - pos;
    if (c === 0) {
      html += `<div class="cell"></div>`;
    } else if (digitIdx >= 0 && digitIdx < aStr.length && borrowInfo && pos < borrowInfo.length) {
      const bi = borrowInfo[pos];
      // Always show original digit, with small orange annotation if affected by borrow
      html += `<div class="borrow-annotated-cell ${posClass(pos)}">`;
      html += `<span class="main-digit">${bi.originalDigit}</span>`;
      if (bi.needsBorrow && bi.lentToLower) {
        // Both: borrowed +10 and lent -1 to lower
        html += `<span class="borrow-note">${bi.originalDigit}→${bi.displayDigit}</span>`;
      } else if (bi.needsBorrow) {
        html += `<span class="borrow-note">+10→${bi.displayDigit}</span>`;
      } else if (bi.lentToLower) {
        html += `<span class="borrow-note">-1→${bi.displayDigit}</span>`;
      }
      html += `</div>`;
    } else if (digitIdx >= 0 && digitIdx < aStr.length) {
      html += `<div class="cell ${posClass(pos)}">${aStr[digitIdx]}</div>`;
    } else {
      html += `<div class="cell"></div>`;
    }
  }

  // Row 2: Operator + second number
  for (let c = 0; c < colCount; c++) {
    const pos = colCount - 1 - c;
    const digitIdx = bStr.length - 1 - pos;
    if (c === 0) {
      html += `<div class="cell op-cell">${p.op}</div>`;
    } else if (digitIdx >= 0 && digitIdx < bStr.length) {
      html += `<div class="cell ${posClass(pos)}">${bStr[digitIdx]}</div>`;
    } else {
      html += `<div class="cell"></div>`;
    }
  }

  // Row 3: Separator line
  html += `<div class="separator" style="grid-column: 1 / -1;"></div>`;

  // Row 4: Hint row above answer (for subtraction with borrow, or addition with carry)
  if (borrowInfo) {
    for (let c = 0; c < colCount; c++) {
      const pos = colCount - 1 - c;
      const digitIdx = ansStr.length - 1 - pos;
      if (digitIdx >= 0 && digitIdx < ansStr.length && borrowInfo[pos]) {
        const bi = borrowInfo[pos];
        const db = getDigitAt(p.b, pos);
        html += `<div class="digit-hint">(${bi.displayDigit}-${db}=?)</div>`;
      } else {
        html += `<div class="digit-hint"></div>`;
      }
    }
  }

  // Row 5: Answer — always guided (individual digit inputs)
  {
    for (let c = 0; c < colCount; c++) {
      const pos = colCount - 1 - c;
      const digitIdx = ansStr.length - 1 - pos;
      if (digitIdx >= 0 && digitIdx < ansStr.length) {
        const locked = pos !== 0;
        html += `<div class="cell"><input class="digit-input ${posClass(pos)} ${locked ? 'locked' : ''}" id="ans-${pos}" maxlength="2" inputmode="numeric" data-pos="${pos}" ${locked ? 'disabled' : ''} ${pos === 0 ? 'autofocus' : ''}></div>`;
      } else {
        html += `<div class="cell"></div>`;
      }
    }
  }

  html += '</div>';

  // Per-cell feedback area
  html += '<div id="cell-feedback-area"></div>';

  // Scaffold area (kept for direct mode)
  html += '<div id="scaffold-area"></div>';

  area.innerHTML = html;

  setTimeout(() => {
    const focusEl = document.getElementById('ans-0');
    if (focusEl) focusEl.focus();
  }, 100);

  setupGuidedListeners();
}

// ===== GUIDED MODE LISTENERS =====
function parseDigitValue(val) {
  // Normalize full-width digits to half-width, strip non-digits
  const normalized = val.replace(/[０-９]/g, c => String.fromCharCode(c.charCodeAt(0) - 0xFEE0)).replace(/[^0-9]/g, '');
  if (normalized === '') return NaN;
  return parseInt(normalized, 10);
}

// Per-cell feedback display
function showCellFeedback(pos, isCorrect, message, effectiveScaffold) {
  const area = document.getElementById('cell-feedback-area');
  if (!area) return;
  const scaffold = effectiveScaffold || config.scaffold;
  // Clear previous feedback
  area.innerHTML = '';
  let cssClass = 'cell-feedback ';
  if (isCorrect) {
    cssClass += 'correct-feedback';
  } else {
    if (scaffold === 'step') cssClass += 'wrong-feedback-step';
    else if (scaffold === 'full') cssClass += 'wrong-feedback-full';
    else cssClass += 'wrong-feedback';
  }
  const div = document.createElement('div');
  div.className = cssClass;
  div.innerHTML = message;
  area.appendChild(div);
  // TTS: speak feedback (strip HTML tags)
  speak(message.replace(/<[^>]*>/g, ''));
  if (isCorrect) {
    setTimeout(() => { div.classList.add('fade-out'); }, 1500);
    setTimeout(() => { if (div.parentNode) div.remove(); }, 2000);
  }
}

function getCellHintMessage(p, pos, borrowInfo, effectiveScaffold) {
  const scaffold = effectiveScaffold || config.scaffold;
  const posName = posLabel(pos);
  if (p.op === '+') {
    const da = getDigitAt(p.a, pos);
    const db = getDigitAt(p.b, pos);
    // Check if there's incoming carry from previous position
    let carryIn = 0;
    if (pos > 0) {
      let c = 0;
      for (let pp = 0; pp < pos; pp++) {
        const sum = getDigitAt(p.a, pp) + getDigitAt(p.b, pp) + c;
        c = Math.floor(sum / 10);
      }
      carryIn = c;
    }
    const sum = da + db + carryIn;
    const result = sum % 10;
    const carryText = carryIn > 0 ? ` + 進位${carryIn}` : '';
    if (scaffold === 'rethink') {
      return `再想想喔！`;
    } else if (scaffold === 'step') {
      return `${posName}位：${da} + ${db}${carryText} = ?，想想看`;
    } else {
      return `${posName}位：${da} + ${db}${carryText} = ${sum}，答案是 ${result}`;
    }
  } else if (p.op === '-') {
    const bi = borrowInfo ? borrowInfo[pos] : null;
    const db = getDigitAt(p.b, pos);
    const displayDigit = bi ? bi.displayDigit : getDigitAt(p.a, pos);
    const result = displayDigit - db;
    const borrowNote = bi && bi.needsBorrow ? '（借入10）' : (bi && bi.lentToLower ? '（借出1）' : '');
    if (scaffold === 'rethink') {
      return `再想想喔！`;
    } else if (scaffold === 'step') {
      return `${posName}位：${displayDigit} - ${db} = ?，再算算`;
    } else {
      return `${posName}位：${displayDigit} - ${db} = ${result}，答案是 ${result}`;
    }
  } else if (p.op === '×') {
    if (scaffold === 'rethink') return `再想想喔！`;
    if (scaffold === 'step') return `想想看 ${p.a} × ${p.b} 的${posName}位是多少`;
    const expectedDigit = getDigitAt(p.answer, pos);
    return `${posName}位答案是 ${expectedDigit}`;
  }
  return `再想想喔！`;
}

function getCorrectCellMessage(p, pos, borrowInfo) {
  const posName = posLabel(pos);
  if (p.op === '+') {
    const da = getDigitAt(p.a, pos);
    const db = getDigitAt(p.b, pos);
    let carryIn = 0;
    if (pos > 0) {
      let c = 0;
      for (let pp = 0; pp < pos; pp++) {
        const sum = getDigitAt(p.a, pp) + getDigitAt(p.b, pp) + c;
        c = Math.floor(sum / 10);
      }
      carryIn = c;
    }
    const carryText = carryIn > 0 ? ` + ${carryIn}` : '';
    const sum = da + db + carryIn;
    return `✓ 對了！${posName}位 ${da} + ${db}${carryText} = ${sum % 10}`;
  } else if (p.op === '-') {
    const bi = borrowInfo ? borrowInfo[pos] : null;
    const db = getDigitAt(p.b, pos);
    const displayDigit = bi ? bi.displayDigit : getDigitAt(p.a, pos);
    const result = displayDigit - db;
    return `✓ 對了！${posName}位 ${displayDigit} - ${db} = ${result}`;
  } else if (p.op === '×') {
    const result = getDigitAt(p.answer, pos);
    return `✓ 對了！${posName}位是 ${result}`;
  }
  return `✓ 對了！`;
}

function setupGuidedListeners() {
  const p = currentProblem;
  const ansStr = String(p.answer);
  const needBorrow = (p.op === '-');

  // Compute expected carry for addition
  const carries = computeCarries(p);

  // Precompute borrow info for subtraction
  let borrowInfo = null;
  if (needBorrow) {
    borrowInfo = precomputeBorrow(p.a, p.b);
  }

  const handleDigitInput = (pos) => {
    const input = document.getElementById(`ans-${pos}`);
    if (!input) return;

    const onInput = () => {
      const rawVal = input.value.trim();
      if (rawVal === '') return;

      const parsed = parseDigitValue(rawVal);
      if (isNaN(parsed)) { input.value = ''; return; }
      input.value = String(parsed % 10);

      const expectedDigit = getDigitAt(p.answer, pos);
      if (parsed % 10 === expectedDigit) {
        input.classList.add('correct-cell');
        input.disabled = true;
        input.removeEventListener('input', onInput);
        input.removeEventListener('keydown', onKeydown);
        playCorrectSound();
        showCellFeedback(pos, true, getCorrectCellMessage(p, pos, borrowInfo));

        // For addition: handle carry input before moving to next
        if (p.op === '+') {
          const carryInput = document.getElementById(`carry-${pos + 1}`);
          if (carryInput && carries[pos + 1] !== undefined && carries[pos + 1] !== 0) {
            carryInput.disabled = false;
            carryInput.focus();
            let carryRetryCount = 0;
            const carryHandler = () => {
              const carryVal = parseDigitValue(carryInput.value);
              if (isNaN(carryVal)) { carryInput.value = ''; return; }
              carryInput.value = String(carryVal);
              if (carryVal === carries[pos + 1]) {
                carryInput.disabled = true;
                carryInput.style.background = '#2e7d32';
                carryInput.removeEventListener('input', carryHandler);
                unlockNext(pos + 1);
              } else {
                currentHadError = true;
                carryRetryCount++;
                shakeElement(carryInput);
                playWrongSound();
                carryInput.value = '';
                // Carry hint based on scaffold level
                const da = getDigitAt(p.a, pos);
                const db = getDigitAt(p.b, pos);
                let carryIn = 0;
                if (pos > 0) {
                  let c = 0;
                  for (let pp = 0; pp < pos; pp++) {
                    const s = getDigitAt(p.a, pp) + getDigitAt(p.b, pp) + c;
                    c = Math.floor(s / 10);
                  }
                  carryIn = c;
                }
                const colSum = da + db + carryIn;
                const carryText = carryIn > 0 ? ` + 進位${carryIn}` : '';
                let effectiveScaffold = config.scaffold;
                if (effectiveScaffold === 'rethink' && carryRetryCount >= 2) {
                  effectiveScaffold = 'step';
                }
                let msg;
                if (effectiveScaffold === 'rethink') {
                  msg = `進位再想想！這個數字要進到${posLabel(pos + 1)}位喔`;
                } else if (effectiveScaffold === 'step') {
                  msg = `${posLabel(pos)}位 ${da}+${db}${carryText}=${colSum}，超過10要進位，進位的數字是 ?`;
                } else {
                  msg = `${posLabel(pos)}位 ${da}+${db}${carryText}=${colSum}，超過10要進位，進位填 ${carries[pos + 1]}`;
                }
                showCellFeedback(pos, false, msg, effectiveScaffold);
              }
            };
            carryInput.addEventListener('input', carryHandler);
            return;
          }
        }
        // For subtraction: skip carry, go directly to next
        unlockNext(pos + 1);
      } else {
        // Wrong answer for this cell
        currentHadError = true;
        if (!cellRetryCount[pos]) cellRetryCount[pos] = 0;
        cellRetryCount[pos]++;

        // Determine effective scaffold level
        let effectiveScaffold = config.scaffold;
        if (config.scaffold === 'rethink' && cellRetryCount[pos] >= 2) {
          // Escalate: after 2 wrong attempts, show step-level hint
          effectiveScaffold = 'step';
        }

        shakeElement(input);
        playWrongSound();

        if (effectiveScaffold === 'full') {
          // Full guidance: show answer, let student type it
          input.value = '';
          input.classList.add('wrong-cell');
          setTimeout(() => input.classList.remove('wrong-cell'), 1500);
        } else if (effectiveScaffold === 'rethink') {
          // Rethink: red border, can retry
          input.value = '';
          input.classList.add('wrong-cell');
          setTimeout(() => input.classList.remove('wrong-cell'), 1500);
        } else {
          // Step: show formula without answer
          input.value = '';
          input.classList.add('wrong-cell');
          setTimeout(() => input.classList.remove('wrong-cell'), 1500);
        }

        showCellFeedback(pos, false, getCellHintMessage(p, pos, borrowInfo, effectiveScaffold), effectiveScaffold);
      }
    };

    const onKeydown = (e) => {
      if (e.key === 'Enter') {
        onInput();
      }
    };

    input.addEventListener('input', onInput);
    input.addEventListener('keydown', onKeydown);
  };

  const unlockNext = (nextPos) => {
    if (nextPos >= ansStr.length) {
      playCorrectSound();
      showStars();
      speak('答對了！');
      results.push({ problem: p, studentAnswer: p.answer, correct: true, hadError: currentHadError, time: elapsedSeconds });
      setTimeout(nextProblem, 800);
      return;
    }
    const nextInput = document.getElementById(`ans-${nextPos}`);
    if (nextInput) {
      nextInput.classList.remove('locked');
      nextInput.disabled = false;
      nextInput.focus();
      handleDigitInput(nextPos);
    } else {
      playCorrectSound();
      showStars();
      speak('答對了！');
      results.push({ problem: p, studentAnswer: p.answer, correct: true, hadError: currentHadError, time: elapsedSeconds });
      setTimeout(nextProblem, 800);
    }
  };

  handleDigitInput(0);
}

function computeCarries(p) {
  const carries = {};
  if (p.op === '+') {
    let carry = 0;
    const maxLen = Math.max(String(p.a).length, String(p.b).length) + 1;
    for (let pos = 0; pos < maxLen; pos++) {
      const sum = getDigitAt(p.a, pos) + getDigitAt(p.b, pos) + carry;
      carry = Math.floor(sum / 10);
      if (carry > 0) carries[pos + 1] = carry;
    }
  } else if (p.op === '-') {
    let borrow = 0;
    const maxLen = String(p.a).length;
    for (let pos = 0; pos < maxLen; pos++) {
      let diff = getDigitAt(p.a, pos) - getDigitAt(p.b, pos) - borrow;
      if (diff < 0) {
        borrow = 1;
        carries[pos + 1] = 1;
      } else {
        borrow = 0;
      }
    }
  }
  return carries;
}

// Precompute borrow info for subtraction: returns per-position info
function precomputeBorrow(a, b) {
  const aLen = String(a).length;
  const borrowInfo = []; // borrowInfo[pos] = { needsBorrow, lentToLower, displayDigit, originalDigit }
  let borrow = 0;
  for (let pos = 0; pos < aLen; pos++) {
    const da = getDigitAt(a, pos);
    const db = getDigitAt(b, pos);
    const effective = da - borrow;
    const info = { originalDigit: da, lentToLower: false, needsBorrow: false, displayDigit: da, borrowedFrom: borrow > 0 };
    if (effective < db) {
      // This position needs to borrow from next
      info.needsBorrow = true;
      info.displayDigit = effective + 10;
      borrow = 1;
    } else {
      info.displayDigit = effective;
      info.needsBorrow = false;
      borrow = 0;
    }
    borrowInfo[pos] = info;
  }
  // Mark which positions lent (had borrow taken from them)
  for (let pos = 0; pos < aLen; pos++) {
    if (borrowInfo[pos].needsBorrow && pos + 1 < aLen) {
      borrowInfo[pos + 1].lentToLower = true;
    }
  }
  return borrowInfo;
}

// ===== SCAFFOLD (used for direct mode and multiplication guided) =====
function showScaffold(pos) {
  const area = document.getElementById('scaffold-area');
  if (!area) return;
  const p = currentProblem;
  let html = '';

  if (config.scaffold === 'rethink') {
    const hints = [
      '再仔細想想看喔！',
      '慢慢來，再算一次看看！',
      '不急，仔細看看每一位的數字！',
      '你可以的，再試一次！'
    ];
    html = `<div class="scaffold-msg scaffold-hint">${hints[randInt(0, hints.length - 1)]}</div>`;
  } else if (config.scaffold === 'step') {
    html = `<div class="scaffold-msg scaffold-step">${getStepHint(p, pos)}</div>`;
  } else if (config.scaffold === 'full') {
    html = `<div class="scaffold-msg scaffold-full">${getFullGuidance(p)}</div>`;
  }

  area.innerHTML = html;
  // TTS: speak scaffold hint (strip HTML tags)
  const textContent = area.textContent || area.innerText || '';
  if (textContent) speak(textContent);
}

function getStepHint(p, pos) {
  if (p.op === '+') {
    if (pos >= 0) {
      const da = getDigitAt(p.a, pos);
      const db = getDigitAt(p.b, pos);
      return `${posLabel(pos)}位：${da} + ${db} = ?，想想看答案是多少`;
    }
    return `把每一位的數字從個位開始相加，記得看看有沒有進位喔！`;
  } else if (p.op === '-') {
    if (pos >= 0) {
      const da = getDigitAt(p.a, pos);
      const db = getDigitAt(p.b, pos);
      if (da < db) return `${posLabel(pos)}位：${da} 不夠減 ${db}，要向${posLabel(pos + 1)}位借 1`;
      return `${posLabel(pos)}位：${da} - ${db} = ?`;
    }
    return `從個位開始相減，不夠減的時候要向前一位借 1 喔！`;
  } else if (p.op === '×') {
    return `先算 ${p.b} × 個位數字，再算 ${p.b} × 十位數字，最後加起來`;
  } else {
    return `想想看 ${p.b} × ? = ${p.a}`;
  }
}

function getFullGuidance(p) {
  let steps = '';
  if (p.op === '+') {
    let carry = 0;
    const maxLen = Math.max(String(p.a).length, String(p.b).length);
    for (let pos = 0; pos <= maxLen; pos++) {
      const da = getDigitAt(p.a, pos);
      const db = getDigitAt(p.b, pos);
      const sum = da + db + carry;
      if (da === 0 && db === 0 && carry === 0) continue;
      const write = sum % 10;
      const newCarry = Math.floor(sum / 10);
      steps += `${posLabel(pos)}位：${da} + ${db}${carry ? ' + 進位' + carry : ''} = ${sum}`;
      if (newCarry > 0) steps += `，寫 ${write} 進 ${newCarry}`;
      else steps += `，寫 ${write}`;
      steps += '<br>';
      carry = newCarry;
    }
    steps += `<b>答案：${p.answer}</b>`;
  } else if (p.op === '-') {
    let borrow = 0;
    const maxLen = String(p.a).length;
    for (let pos = 0; pos < maxLen; pos++) {
      let da = getDigitAt(p.a, pos) - borrow;
      const db = getDigitAt(p.b, pos);
      if (da < db) {
        steps += `${posLabel(pos)}位：${da} 不夠減 ${db}，向${posLabel(pos + 1)}位借 1，${da + 10} - ${db} = ${da + 10 - db}<br>`;
        borrow = 1;
      } else {
        steps += `${posLabel(pos)}位：${da} - ${db} = ${da - db}<br>`;
        borrow = 0;
      }
    }
    steps += `<b>答案：${p.answer}</b>`;
  } else if (p.op === '×') {
    steps += `${p.a} × ${p.b} = ${p.answer}<br>`;
    const bStr = String(p.b);
    for (let i = bStr.length - 1; i >= 0; i--) {
      const d = parseInt(bStr[i]);
      const posVal = Math.pow(10, bStr.length - 1 - i);
      steps += `${p.a} × ${d}${posVal > 1 ? '（' + posLabel(bStr.length - 1 - i) + '位）' : ''} = ${p.a * d}${posVal > 1 ? ' → 實際是 ' + (p.a * d * posVal) : ''}<br>`;
    }
    steps += `<b>答案：${p.answer}</b>`;
  } else {
    steps += `${p.a} ÷ ${p.b} = ${p.answer}<br>`;
    steps += `因為 ${p.b} × ${p.answer} = ${p.a}<br>`;
    steps += `<b>答案：${p.answer}</b>`;
  }
  return steps;
}

// ===== MULTIPLICATION GUIDED (3 steps) =====
function renderMultiplicationGuided(area) {
  const p = currentProblem;
  guidedStep = 1;

  // For simplicity, handle 2-digit × 1-digit case (main use case)
  // For other cases, fall back to standard
  if (String(p.b).length === 1 && String(p.a).length >= 2) {
    renderMultStep1(area, p);
  } else if (String(p.a).length === 1 && String(p.b).length >= 2) {
    // Swap for display
    renderMultStep1(area, { ...p, a: p.b, b: p.a, answer: p.answer, op: '×' });
  } else {
    // Fallback to standard for other configurations
    renderStandard(area);
  }
}

function renderMultStep1(area, p) {
  const aStr = String(p.a);
  const ones = parseInt(aStr[aStr.length - 1]);
  const multiplier = parseInt(String(p.b));
  const partialProduct1 = ones * multiplier;

  let html = '<div style="text-align:center;">';
  html += `<div style="font-size:48px; margin-bottom:8px;">${p.a} × ${p.b}</div>`;
  html += `<div class="mult-step-info">`;
  html += `步驟 1：先算個位 <span class="highlight-digit">${ones}</span> × ${multiplier} = ?`;
  html += `</div>`;
  html += `<div style="margin-top:16px;">`;
  html += `<input class="digit-input" id="mult-step-input" inputmode="numeric" style="width:120px;" autofocus>`;
  html += `<button class="btn-confirm" style="margin-left:12px;" onclick="checkMultStep(1)">確認</button>`;
  html += `</div>`;
  html += `<div id="scaffold-area"></div>`;
  html += '</div>';
  area.innerHTML = html;

  // Store step data
  area.dataset.step = '1';
  area.dataset.partialA = ones;
  area.dataset.partialB = multiplier;
  area.dataset.partial1 = partialProduct1;

// Multiplication step hint with carry awareness
function showMultStepHint(factorA, factorB, expected, stepId) {
  if (!cellRetryCount[stepId]) cellRetryCount[stepId] = 0;
  cellRetryCount[stepId]++;

  let effectiveScaffold = config.scaffold;
  if (effectiveScaffold === 'rethink' && cellRetryCount[stepId] >= 2) {
    effectiveScaffold = 'step';
  }

  const area = document.getElementById('scaffold-area');
  if (!area) return;
  let msg;
  if (effectiveScaffold === 'rethink') {
    msg = `再想想喔！${factorA} × ${factorB} 等於多少？`;
  } else if (effectiveScaffold === 'step') {
    msg = `${factorA} × ${factorB} = ?，想想看答案是多少`;
  } else {
    msg = `${factorA} × ${factorB} = ${expected}，答案是 ${expected}`;
  }
  const cssClass = effectiveScaffold === 'full' ? 'scaffold-full' : (effectiveScaffold === 'step' ? 'scaffold-step' : 'scaffold-hint');
  area.innerHTML = `<div class="scaffold-msg ${cssClass}">${msg}</div>`;
  speak(msg);
}

function checkMultStep(step) {
  const input = document.getElementById('mult-step-input');
  if (!input) return;
  const val = parseDigitValue(input.value);
  if (isNaN(val)) return;

  const area = document.getElementById('problem-area');
  const origA = parseInt(area.dataset.origA, 10);
  const origB = parseInt(area.dataset.origB, 10);
  const answer = parseInt(area.dataset.answer, 10);
  const aStr = String(origA);

  if (step === 1) {
    const ones = parseInt(aStr[aStr.length - 1]);
    const expected = ones * origB;
    if (val === expected) {
      playCorrectSound();
      // Move to step 2
      const tens = parseInt(aStr[aStr.length - 2]);
      const tensValue = tens * 10;
      const partial2 = tensValue * origB;

      let html = '<div style="text-align:center;">';
      html += `<div style="font-size:48px; margin-bottom:8px;">${origA} × ${origB}</div>`;
      html += `<div class="mult-step-info">`;
      html += `✓ 個位 ${ones} × ${origB} = ${expected}<br>`;
      html += `步驟 2：十位的 <span class="highlight-digit">${tens}</span> 其實是 <span class="highlight-digit">${tensValue}</span>，${tensValue} × ${origB} = ?`;
      html += `</div>`;
      html += `<div style="margin-top:16px;">`;
      html += `<input class="digit-input" id="mult-step-input" inputmode="numeric" style="width:160px;" autofocus>`;
      html += `<button class="btn-confirm" style="margin-left:12px;" onclick="checkMultStep(2)">確認</button>`;
      html += `</div>`;
      html += `<div id="scaffold-area"></div>`;
      html += '</div>';
      area.innerHTML = html;
      area.dataset.step = '2';
      area.dataset.partial1 = expected;
      area.dataset.partial2 = partial2;

      setTimeout(() => document.getElementById('mult-step-input')?.focus(), 100);
      document.getElementById('mult-step-input')?.addEventListener('keydown', e => { if (e.key === 'Enter') checkMultStep(2); });
    } else {
      currentHadError = true;
      playWrongSound();
      shakeElement(area);
      // Step-specific carry-aware hints for multiplication
      const ones = parseInt(aStr[aStr.length - 1]);
      const expected1 = ones * origB;
      showMultStepHint(ones, origB, expected1, 'mult-step-1');
      input.value = '';
    }
  } else if (step === 2) {
    const tens = parseInt(aStr[aStr.length - 2]);
    const tensValue = tens * 10;
    const expected = tensValue * origB;
    const partial1 = parseInt(area.dataset.partial1);

    if (val === expected) {
      playCorrectSound();
      // Move to step 3
      let html = '<div style="text-align:center;">';
      html += `<div style="font-size:48px; margin-bottom:8px;">${origA} × ${origB}</div>`;
      html += `<div class="mult-step-info">`;
      html += `✓ 個位部分 = ${partial1}<br>`;
      html += `✓ 十位部分 = ${expected}<br>`;
      html += `步驟 3：把 ${partial1} 和 ${expected} 加起來 = ?`;
      html += `</div>`;
      html += `<div style="margin-top:16px;">`;
      html += `<input class="digit-input" id="mult-step-input" inputmode="numeric" style="width:160px;" autofocus>`;
      html += `<button class="btn-confirm" style="margin-left:12px;" onclick="checkMultStep(3)">確認</button>`;
      html += `</div>`;
      html += `<div id="scaffold-area"></div>`;
      html += '</div>';
      area.innerHTML = html;
      area.dataset.step = '3';

      setTimeout(() => document.getElementById('mult-step-input')?.focus(), 100);
      document.getElementById('mult-step-input')?.addEventListener('keydown', e => { if (e.key === 'Enter') checkMultStep(3); });
    } else {
      currentHadError = true;
      playWrongSound();
      shakeElement(area);
      // Step-specific carry-aware hints for multiplication
      showMultStepHint(tensValue, origB, expected, 'mult-step-2');
      input.value = '';
    }
  } else if (step === 3) {
    if (val === answer) {
      playCorrectSound();
      showStars();
      speak('答對了！');
      results.push({ problem: currentProblem, studentAnswer: val, correct: true, hadError: currentHadError, time: elapsedSeconds });
      setTimeout(nextProblem, 800);
    } else {
      currentHadError = true;
      playWrongSound();
      shakeElement(area);
      if (!retryAllowed) {
        retryAllowed = true;
        showScaffold(-1);
        input.value = '';
      } else {
        results.push({ problem: currentProblem, studentAnswer: val, correct: false, hadError: true, time: elapsedSeconds });
        setTimeout(nextProblem, 500);
      }
    }
  }
}

// ===== NEXT PROBLEM =====
function nextProblem() {
  currentIdx++;
  if (currentIdx >= problems.length) {
    finishPractice();
  } else {
    showProblem();
  }
}

// ===== FINISH =====
function finishPractice() {
  stopTimer();

  // Record unanswered problems
  while (results.length < problems.length && results.length < currentIdx) {
    // Already recorded
  }
  // If time ran out, mark remaining as unanswered
  for (let i = results.length; i < problems.length; i++) {
    results.push({ problem: problems[i], studentAnswer: '未作答', correct: false, hadError: true, time: elapsedSeconds });
  }

  playCelebrationSound();
  showConfetti();
  speak('恭喜你全部完成了！');
  showScreen('result-screen');
  renderResults();
}

// ===== RESULTS =====
function renderResults() {
  const correctCount = results.filter(r => !r.hadError).length;
  const total = results.length;
  const rate = total > 0 ? Math.round((correctCount / total) * 100) : 0;
  const now = new Date();
  const dateStr = now.getFullYear() + '-' +
    String(now.getMonth() + 1).padStart(2, '0') + '-' +
    String(now.getDate()).padStart(2, '0') + ' ' +
    String(now.getHours()).padStart(2, '0') + ':' +
    String(now.getMinutes()).padStart(2, '0');

  const opNames = { '+': '加法', '-': '減法', '×': '乘法', '÷': '除法' };
  const opsText = config.ops.map(o => opNames[{ add: '+', sub: '-', mul: '×', div: '÷' }[o]]).join('、');

  const m = Math.floor(elapsedSeconds / 60);
  const s = elapsedSeconds % 60;
  const timeStr = `${m} 分 ${s} 秒`;

  let html = '';

  // Summary
  html += `<div class="result-summary">`;
  html += `<div style="font-size:1.2rem; margin-bottom:8px;">${config.name}　${dateStr}</div>`;
  html += `<div style="font-size:1rem; color:#90caf9; margin-bottom:12px;">${opsText} ｜ ${config.digits1}位×${config.digits2}位 ｜ ${config.allowCarry ? '允許進退位' : '不允許進退位'}</div>`;
  html += `<div class="big-score">${rate}%</div>`;
  html += `<div class="sub-info">${correctCount} / ${total} 題正確　用時 ${timeStr}</div>`;
  html += `</div>`;

  // Detail table
  html += `<table class="result-table">`;
  html += `<thead><tr><th>#</th><th>題目</th><th>你的答案</th><th>正確答案</th><th>結果</th></tr></thead>`;
  html += `<tbody>`;
  results.forEach((r, i) => {
    const isCorrect = !r.hadError;
    const cls = isCorrect ? 'correct-row' : 'wrong-row';
    const mark = isCorrect ? '✓' : '✗';
    const probStr = `${r.problem.a} ${r.problem.op} ${r.problem.b}`;
    const ansDisplay = r.hadError ? `${r.studentAnswer} (有錯誤)` : `${r.studentAnswer}`;
    html += `<tr class="${cls}"><td>${i + 1}</td><td>${probStr}</td><td>${ansDisplay}</td><td>${r.problem.answer}</td><td>${mark}</td></tr>`;
  });
  html += `</tbody></table>`;

  // Buttons
  html += `<div class="result-buttons">`;
  html += `<button class="btn-download" onclick="downloadCSV()">📥 下載 CSV</button>`;
  html += `<button class="btn-copy" onclick="copyToClipboard()">📋 複製到 Sheets</button>`;
  if (config.sheetsUrl) {
    html += `<button class="btn-upload" onclick="uploadToSheets()">☁️ 上傳 Sheets</button>`;
  }
  html += `<button class="btn-retry" onclick="retryPractice()">🔄 再練一次</button>`;
  html += `<button class="btn-reset" onclick="resetSetup()">⚙️ 回到選單</button>`;
  html += `</div>`;

  document.getElementById('result-content').innerHTML = html;
}

// ===== CSV =====
function getCSVData() {
  const now = new Date();
  const dateStr = now.getFullYear() + '-' +
    String(now.getMonth() + 1).padStart(2, '0') + '-' +
    String(now.getDate()).padStart(2, '0') + ' ' +
    String(now.getHours()).padStart(2, '0') + ':' +
    String(now.getMinutes()).padStart(2, '0');
  const opMap = { add: '加法', sub: '減法', mul: '乘法', div: '除法' };

  let csv = '姓名,日期時間,運算,第一數位數,第二數位數,進退位,題目,學生答案,正確答案,結果,用時(秒)\n';
  results.forEach(r => {
    const opName = opMap[config.ops.find(o => ({ add: '+', sub: '-', mul: '×', div: '÷' })[o] === r.problem.op)] || '';
    const probStr = `${r.problem.a}${r.problem.op}${r.problem.b}`;
    const result = r.hadError ? '錯誤' : '正確';
    csv += `${config.name},${dateStr},${opName},${config.digits1}位,${config.digits2}位,${config.allowCarry ? '允許' : '不允許'},${probStr},${r.studentAnswer},${r.problem.answer},${result},${elapsedSeconds}\n`;
  });
  return csv;
}

function downloadCSV() {
  const csv = '\uFEFF' + getCSVData(); // BOM for Excel UTF-8
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `數學練習_${config.name}_${new Date().toISOString().slice(0, 10)}.csv`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('CSV 已下載');
}

function copyToClipboard() {
  const now = new Date();
  const dateStr = now.getFullYear() + '-' +
    String(now.getMonth() + 1).padStart(2, '0') + '-' +
    String(now.getDate()).padStart(2, '0') + ' ' +
    String(now.getHours()).padStart(2, '0') + ':' +
    String(now.getMinutes()).padStart(2, '0');

  let tsv = '姓名\t日期時間\t運算\t第一數位數\t第二數位數\t進退位\t題目\t學生答案\t正確答案\t結果\t用時(秒)\n';
  results.forEach(r => {
    const probStr = `${r.problem.a}${r.problem.op}${r.problem.b}`;
    const result = r.hadError ? '錯誤' : '正確';
    tsv += `${config.name}\t${dateStr}\t${r.problem.op}\t${config.digits1}位\t${config.digits2}位\t${config.allowCarry ? '允許' : '不允許'}\t${probStr}\t${r.studentAnswer}\t${r.problem.answer}\t${result}\t${elapsedSeconds}\n`;
  });

  navigator.clipboard.writeText(tsv).then(() => {
    showToast('已複製！可直接貼到 Google Sheets');
  }).catch(() => {
    showToast('複製失敗，請手動選取');
  });
}

function uploadToSheets() {
  if (!config.sheetsUrl) return;

  const payload = results.map(r => ({
    name: config.name,
    datetime: new Date().toISOString(),
    operation: r.problem.op,
    digits1: config.digits1,
    digits2: config.digits2,
    carry: config.allowCarry ? '允許' : '不允許',
    problem: `${r.problem.a}${r.problem.op}${r.problem.b}`,
    studentAnswer: String(r.studentAnswer),
    correctAnswer: String(r.problem.answer),
    result: r.hadError ? '錯誤' : '正確',
    timeSeconds: elapsedSeconds
  }));

  fetch(config.sheetsUrl, {
    method: 'POST',
    mode: 'no-cors',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload)
  }).then(() => {
    showToast('已上傳到 Google Sheets！');
  }).catch(err => {
    showToast('上傳失敗：' + err.message);
  });
}

// ===== RETRY / RESET =====
function retryPractice() {
  generateAllProblems();
  currentIdx = 0;
  results = [];
  showScreen('practice-screen');
  startTimer();
  showProblem();
}

function abandonPractice() {
  if (!confirm('確定要放棄練習嗎？')) return;
  stopTimer();
  results = [];
  showScreen('setup-screen');
}

function resetSetup() {
  stopTimer();
  showScreen('setup-screen');
}

// ===== TOAST =====
function showToast(msg) {
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2000);
}
</script>
